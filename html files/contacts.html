    <main class="contact-container">
        <h2>Свържете се с нас</h2>
        <p>Имате въпроси? Попълнете формата или се свържете с нас чрез социалните мрежи.</p>

        <div class="contact-content">
            
            <form id="contact-form">
                <label for="name">Име</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Имейл</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Съобщение</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Изпрати</button>
            </form>

            
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3640.1809115838705!2d24.740542899999998!3d42.1423846!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14acd1b7a417cc81%3A0x9a12a142d739a79e!2sHalm%20Na%20OsvoboditelitePlovdiv%20Center%2C%20bul.%20Ruski%2050%2C%204000%20Plovdiv!5e1!3m2!1sen!2sbg!4v1739105145507!5m2!1sen!2sbg" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>

    </main>
