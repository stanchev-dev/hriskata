<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плащане - CROSS BMX Футболен магазин</title>
    <link rel="stylesheet" href="../css files/payment.css"> 
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
   
    <link rel="icon" href="../images/favicon.ico" type="image/x-icon">
    <meta name="description" content="Плащане на CROSS BMX - Футболен магазин с лесен и сигурен процес на покупка.">
</head>
<body>
    
    <nav class="navbar" aria-label="Main Navigation">
        <div class="navbar-container">
           
            <div class="brand">
                <a href="index.html">
                    CROSS BMX
                </a>
            </div>

           
            <div class="hamburger" id="hamburger" aria-label="Toggle Navigation" aria-expanded="false" role="button" tabindex="0">
                <span class="material-icons">menu</span>
            </div>

            
            <ul class="nav-links" id="nav-links">
                <li class="nav-link">
                    <a href="index.html">Начало</a>
                </li>
                <li class="nav-link services">
                    <a href="catalog.html" aria-haspopup="true" aria-expanded="false">
                        Каталог
                        <span class="material-icons dropdown-icon">arrow_drop_down</span>
                    </a>
                    <ul class="drop-down" aria-label="Каталог Submenu">
                        <li><a href="sales.html">Продажби</a></li>
                        <li><a href="promotions.html">Промоции</a></li>
                    </ul>
                </li>
                <li class="nav-link">
                    <a href="contacts.html">Контакти</a>
                </li>
                <li class="nav-link">
                    <a href="author.html">За автора</a>
                </li>
            </ul>
        </div>
    </nav>

   
    <main>
       
        <section class="payment">
            <h2>Плащане</h2>
            <div class="payment-container">
               
                <div class="order-summary">
                    <h3>Обобщение на поръчката</h3>
                    <ul id="order-items">
                       
                    </ul>
                    <p>Total: <span id="order-total">0 евро</span></p>
                </div>

               
                <div class="payment-form">
                    <h3>Детайли за плащане</h3>
                    <form id="payment-form">
                        <div class="form-group">
                            <label for="full-name">Пълно име</label>
                            <input type="text" id="full-name" name="full-name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Имейл</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="address">Адрес</label>
                            <input type="text" id="address" name="address" required>
                        </div>
                        <div class="form-group">
                         <label for="card-number">Номер на карта</label>
                            <input type="text" id="card-number" name="card-number" required pattern="\d{16}" placeholder="1234 5678 9012 3456">
                        </div>
                        <div class="form-group">
                            <label for="expiry">Срок на валидност</label>
                            <input type="text" id="expiry" name="expiry" required pattern="\d{2}/\d{2}" placeholder="MM/YY">
                        </div>
                        <div class="form-group">
                            <label for="cvc">CVC</label>
                            <input type="text" id="cvc" name="cvc" required pattern="\d{3}" placeholder="123">
                        </div>
                        <button type="submit" class="submit-btn">Плати</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

  
    <footer class="footer">
        <div class="footer-container">
           
            <div class="footer-brand">
                
            </div>
        
           
            <div class="footer-links">
                <a href="../html files/index.html">Начало</a>
                <a href="../html files/catalog.html">Каталог</a>
                <a href="../html files/contacts.html">Контакти</a>
                <a href="../html files/author.html">За автора</a>
            </div>
            
            
            <div class="footer-social">
                <a href="https://www.facebook.com/" aria-label="Facebook">
                    <i class="fa-brands fa-facebook"></i>
                </a>
                <a href="https://x.com/?mx=2" aria-label="Twitter">
                    <i class="fa-brands fa-twitter"></i>
                </a>
                <a href="https://www.instagram.com/" aria-label="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://www.youtube.com/" aria-label="YouTube">
                    <i class="fa-brands fa-youtube"></i>
                </a>
            </div>
            
           
            <div class="footer-newsletter">
                <h3>Абонирай се за нашия бюлетин</h3>
                <form action="#" method="POST">
                    <input type="email" name="email" placeholder="Вашият имейл" required>
                    <button type="submit">Абонирай се</button>
                </form>
            </div>
            
           
            
        </div>
    </footer>



    <!-- JavaScript Files -->
    <script src="../js files/navbar.js"></script>
    <script src="../js files/payment.js"></script> <!-- New script for payment -->
    <script src="https://kit.fontawesome.com/c0669ad8a0.js" crossorigin="anonymous"></script>
</body>
</html>
